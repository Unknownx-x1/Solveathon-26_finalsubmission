services:
  - type: web
    name: solvathon-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: solvathon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOADS_ROOT
        value: /var/data/uploads
      - key: FLASK_ENV
        value: production

databases:
  - name: solvathon-db
    plan: free
