{% extends "student/student_layout.html" %}

{% block student_content %}
<div class="space-y-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">Laundry Status</h1>
        <p class="text-sm text-gray-500 mt-1">Track your batches by current stage</p>
    </div>

    <section>
        <h2 class="text-lg font-semibold text-gray-900 mb-3">Pending</h2>
        <div id="list-pending" class="space-y-2"></div>
    </section>

    <section>
        <h2 class="text-lg font-semibold text-gray-900 mb-3">Processing</h2>
        <p class="text-xs text-gray-500 mb-2">Submitted, washing, or ready for pickup</p>
        <div id="list-processing" class="space-y-2"></div>
    </section>

    <section>
        <h2 class="text-lg font-semibold text-gray-900 mb-3">Completed</h2>
        <div id="list-completed" class="space-y-2"></div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    const sid = localStorage.getItem('studentId');
    if (!sid) {
        window.location.replace('/student/register');
        return;
    }

    function emptyBox(msg) {
        return '<div class="rounded-lg border border-dashed border-gray-200 p-6 text-center text-sm text-gray-500">' + msg + '</div>';
    }

    function statusBadge(status) {
        const map = {
            booked: { c: 'bg-sky-100 text-sky-800 border-sky-200', l: 'Booked' },
            pending: { c: 'bg-gray-100 text-gray-800 border-gray-200', l: 'Pending' },
            collected: { c: 'bg-blue-100 text-blue-800 border-blue-200', l: 'Submitted' },
            washing: { c: 'bg-amber-100 text-amber-800 border-amber-200', l: 'Washing' },
            washed: { c: 'bg-green-100 text-green-800 border-green-200', l: 'Ready' },
            pickedUp: { c: 'bg-violet-100 text-violet-800 border-violet-200', l: 'Picked Up' }
        };
        const x = map[status] || { c: 'bg-gray-100 text-gray-800 border-gray-200', l: status };
        return '<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-semibold border ' + x.c + '">' + x.l + '</span>';
    }

    function card(b) {
        const t = b.createdAt || b.created_at;
        const when = t ? new Date(t).toLocaleString() : '';
        let scheduledLine = '';
        if (b.scheduledDate) {
            const d = new Date(b.scheduledDate + 'T00:00:00');
            const day = d.toLocaleDateString(undefined, { weekday: 'long' });
            scheduledLine = '<p class="text-xs text-gray-500 mt-1">Laundry day: <span class="font-semibold text-gray-700">' + day + '</span> (' + b.scheduledDate + ')</p>';
        }
        const pickupBtn = b.status === 'washed'
            ? '<button data-batch-id="' + b.id + '" class="pickup-btn mt-3 inline-flex items-center px-3 py-1.5 rounded-md bg-violet-600 hover:bg-violet-700 text-white text-xs font-semibold">Mark as Picked Up</button>'
            : '';
        return '<div class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">' +
               '<div class="flex items-start justify-between gap-3">' +
               '<div><p class="text-sm font-semibold text-gray-900">Batch #' + b.id + '</p>' +
               (when ? '<p class="text-xs text-gray-400 mt-1">' + when + '</p>' : '') +
               scheduledLine + '</div>' +
               statusBadge(b.status) + '</div>' + pickupBtn + '</div>';
    }

    async function load() {
        const res = await fetch('/api/batches?studentId=' + encodeURIComponent(sid));
        if (!res.ok) {
            document.getElementById('list-pending').innerHTML = emptyBox('Could not load statuses.');
            document.getElementById('list-processing').innerHTML = emptyBox('Could not load statuses.');
            document.getElementById('list-completed').innerHTML = emptyBox('Could not load statuses.');
            return;
        }
        const batches = await res.json();
        const pending = batches.filter(b => ['booked', 'pending'].includes(b.status));
        const processing = batches.filter(b => ['collected', 'washing', 'washed'].includes(b.status));
        const completed = batches.filter(b => b.status === 'pickedUp');

        document.getElementById('list-pending').innerHTML = pending.length ? pending.map(card).join('') : emptyBox('No pending batches.');
        document.getElementById('list-processing').innerHTML = processing.length ? processing.map(card).join('') : emptyBox('Nothing in processing.');
        document.getElementById('list-completed').innerHTML = completed.length ? completed.map(card).join('') : emptyBox('No completed laundry yet.');

        document.querySelectorAll('.pickup-btn').forEach((btn) => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-batch-id');
                if (!id) return;
                btn.disabled = true;
                btn.textContent = 'Updating...';
                try {
                    const res = await fetch('/api/batches/' + encodeURIComponent(id) + '/status', {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: 'pickedUp' })
                    });
                    if (!res.ok) {
                        const payload = await res.json().catch(() => ({}));
                        alert(payload.error || 'Could not mark picked up.');
                    }
                } catch (e) {
                    console.error(e);
                    alert('Could not mark picked up.');
                }
                load();
            });
        });
    }

    load();
})();
</script>
{% endblock %}
