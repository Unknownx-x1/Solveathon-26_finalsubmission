{% extends "base.html" %}

{% block title %}Student Login — Laundry{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="bg-white rounded-lg p-4 w-fit mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white">Laundry System</h1>
            <p class="text-blue-100 text-sm mt-2">Student Portal</p>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-8 space-y-6">
            <div>
                <h2 class="text-2xl font-bold text-gray-900">Student Login</h2>
                <p class="text-gray-600 text-sm mt-1">Enter your registration number</p>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label for="regno-input" class="block text-sm font-medium text-gray-700 mb-2">Registration number</label>
                    <input
                        type="text"
                        id="regno-input"
                        name="regno"
                        autocomplete="username"
                        placeholder="e.g. 2024001"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    />
                </div>
                <div id="error-message" class="hidden rounded-lg bg-red-50 border border-red-200 p-3 text-sm text-red-700" role="alert"></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
                    Continue
                </button>
            </form>

            <p class="text-center text-sm text-gray-600">
                <a href="/" class="text-blue-600 hover:text-blue-800 font-medium">Back to home</a>
            </p>
        </div>
    </div>
</div>

<div id="loading-overlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 text-center space-y-3 shadow-xl">
        <svg class="animate-spin h-8 w-8 mx-auto text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-gray-600 text-sm">Signing in…</p>
    </div>
</div>

<script>
(function () {
    const form = document.getElementById('login-form');
    const regInput = document.getElementById('regno-input');
    const errorEl = document.getElementById('error-message');
    const loading = document.getElementById('loading-overlay');

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
        loading.classList.add('hidden');
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const regNo = regInput.value.trim();
        if (!regNo) {
            showError('Please enter your registration number.');
            return;
        }

        errorEl.classList.add('hidden');
        loading.classList.remove('hidden');

        try {
            const res = await fetch('/api/students/by-regno/' + encodeURIComponent(regNo));
            if (!res.ok) {
                const err = await res.json().catch(function () { return {}; });
                showError(err.error || 'Registration number not found.');
                return;
            }

            const student = await res.json();
            const id = student.id;
            const name = student.name || '';
            const reg = student.regNo || student.reg_no || regNo;

            localStorage.setItem('studentId', String(id));
            localStorage.setItem('studentName', name);
            localStorage.setItem('studentRegNo', reg);

            const batchRes = await fetch('/api/batches?studentId=' + encodeURIComponent(id));
            const batches = batchRes.ok ? await batchRes.json() : [];
            const hasBatches = Array.isArray(batches) && batches.length > 0;

            loading.classList.add('hidden');
            window.location.href = hasBatches ? '/student' : '/student/submit';
        } catch (err) {
            console.error(err);
            showError('Something went wrong. Please try again.');
        }
    });

    regInput.focus();
})();
</script>
{% endblock %}
