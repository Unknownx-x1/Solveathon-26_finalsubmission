{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-white flex flex-col items-center justify-center p-8">
    <!-- Header / Logo Section -->
    <div class="w-full max-w-3xl flex flex-col items-center mb-16 px-4">
        <img src="{{ url_for('static', filename='image.png') }}" alt="VIT Chennai Logo" class="w-96 md:w-[500px] mb-8 object-contain">
        
        <div class="w-24 h-1 bg-blue-600 rounded-full mb-8"></div>
        
        <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-2 text-center uppercase">Hostel Laundry Management</h1>
        <p class="text-gray-500 text-lg font-medium text-center max-w-md">An automated slot-based laundry system for VIT Chennai residents.</p>
    </div>

    <!-- Portal Entry Section -->
    <div class="w-full max-w-sm space-y-4">
        <div class="p-1 bg-gray-50 border border-gray-100 rounded-2xl flex flex-col gap-3">
            <a id="student-portal-link" href="/student/register" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-3 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 opacity-80 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M12 14l9-5-9-5-9 5 9 5z" />
                    <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                </svg>
                Enter Student Portal
            </a>
            
            <a href="/staff" class="w-full py-4 bg-white border border-gray-200 text-gray-700 hover:border-blue-300 hover:bg-blue-50 rounded-xl font-bold transition-all flex items-center justify-center gap-3 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 opacity-50 group-hover:text-blue-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
                Staff Login
            </a>
        </div>

        <div class="flex justify-center pt-8">
            <select class="portal-lang-toggle bg-transparent text-gray-400 font-bold text-xs uppercase tracking-widest outline-none cursor-pointer border-b-2 border-transparent hover:border-gray-200 transition-all px-2" aria-label="Language">
                <option value="en">English</option>
                <option value="ta">தமிழ்</option>
            </select>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/portal_i18n.js') }}"></script>
<script>
    (function() {
        // No automatic redirection or "Continue" shortcut.
        // Every entry into the student portal should go through the VTOP verification/registration page.
    })();
</script>
{% endblock %}
