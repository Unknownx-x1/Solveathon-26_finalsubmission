{% extends "staff/staff_layout.html" %}

{% block staff_content %}
<div class="space-y-8">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
            <p id="current-date" class="text-gray-500 text-sm mt-1"></p>
        </div>
        <div class="flex gap-2">
            <a href="/staff/notifications" class="inline-flex items-center px-4 py-2 border border-blue-600 text-sm font-medium rounded-md text-blue-600 bg-white hover:bg-blue-50 focus:outline-none">
                Announcements
            </a>
            <a href="/staff/scan" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                </svg>
                Status Update
            </a>
        </div>
    </div>

    <div id="schedule-alert"></div>

    <div id="urgent-panel" class="hidden rounded-xl border border-rose-200 bg-rose-50 p-5 shadow-sm">
        <div class="flex items-center justify-between gap-4">
            <div>
                <p class="text-sm font-bold text-rose-900 uppercase tracking-tight">Urgent Notifications</p>
                <p class="text-xs text-rose-700 mt-1 font-medium">Overflow slots created by missed submissions will appear here.</p>
            </div>
        </div>
        <div id="urgent-list" class="mt-4 space-y-3"></div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4" id="stats-grid">
        <div class="animate-pulse bg-white p-4 border border-gray-200 rounded-lg h-24"></div>
        <div class="animate-pulse bg-white p-4 border border-gray-200 rounded-lg h-24"></div>
        <div class="animate-pulse bg-white p-4 border border-gray-200 rounded-lg h-24"></div>
        <div class="animate-pulse bg-white p-4 border border-gray-200 rounded-lg h-24"></div>
        <div class="animate-pulse bg-white p-4 border border-gray-200 rounded-lg h-24"></div>
        <div class="animate-pulse bg-white p-4 border border-gray-200 rounded-lg h-24"></div>
    </div>

    <div>
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-900">Recent Active Batches</h2>
        </div>
        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm" id="batches-table-container">
            <div class="flex items-center justify-center py-12">
                <svg class="animate-spin h-8 w-8 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </div>
    </div>

    <div>
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-900">Today's Schedule</h2>
        </div>
        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm" id="daily-details-container">
            <div class="flex items-center justify-center py-12">
                <svg class="animate-spin h-8 w-8 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function safeDate(value, mode = 'date') {
        const dt = value ? new Date(value) : new Date();
        if (Number.isNaN(dt.getTime())) {
            return mode === 'time' ? new Date().toLocaleTimeString() : new Date().toLocaleDateString();
        }
        return mode === 'time' ? dt.toLocaleTimeString() : dt.toLocaleDateString();
    }

    function renderCurrentDate() {
        const selectedLang = localStorage.getItem('portal_language') || 'en';
        const dateLocale = selectedLang === 'ta' ? 'ta-IN' : 'en-IN';
        document.getElementById('current-date').textContent = new Date().toLocaleDateString(dateLocale, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    renderCurrentDate();
    window.addEventListener('portal-language-changed', renderCurrentDate);

    async function loadDashboard() {
        try {
            const [summaryRes, batchesRes, urgentRes] = await Promise.all([
                fetch('/api/dashboard/summary'),
                fetch('/api/batches'),
                fetch('/api/urgent-alerts?audience=staff')
            ]);
            const summary = await summaryRes.json();
            const batches = await batchesRes.json();
            const urgentAlerts = urgentRes.ok ? await urgentRes.json() : [];

            const scheduledByDate = {};
            (batches || []).forEach((batch) => {
                if (!batch.scheduledDate) return;
                if (!scheduledByDate[batch.scheduledDate]) scheduledByDate[batch.scheduledDate] = [];
                scheduledByDate[batch.scheduledDate].push({
                    studentName: batch.student ? batch.student.name : 'Unknown',
                    studentRegNo: batch.student ? (batch.student.regNo || batch.student.reg_no || '-') : '-',
                    timeSlot: batch.timeSlot || '-',
                    status: batch.status
                });
            });

            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = `
                <div class="bg-white p-4 border border-gray-200 rounded-lg">
                    <div class="flex items-center gap-2 text-gray-500 mb-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                        <span class="text-xs font-medium uppercase tracking-wider">Students</span>
                    </div>
                    <p class="text-2xl font-bold text-gray-900">${summary.totalStudents}</p>
                </div>
                <div class="bg-white p-4 border border-gray-200 rounded-lg">
                    <div class="flex items-center gap-2 text-gray-500 mb-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        <span class="text-xs font-medium uppercase tracking-wider">Bookings</span>
                    </div>
                    <p class="text-2xl font-bold text-blue-600">${Object.values(scheduledByDate).flat().length}</p>
                </div>
                <div class="bg-white p-4 border border-gray-200 rounded-lg">
                    <div class="flex items-center gap-2 text-gray-500 mb-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
                        <span class="text-xs font-medium uppercase tracking-wider">Submitted</span>
                    </div>
                    <p class="text-2xl font-bold text-blue-700">${summary.submittedBatches}</p>
                </div>
                <div class="bg-white p-4 border border-gray-200 rounded-lg">
                    <div class="flex items-center gap-2 text-gray-500 mb-1">
                        <span class="text-xs font-medium uppercase tracking-wider">Washing</span>
                    </div>
                    <p class="text-2xl font-bold text-amber-700">${summary.inWashing}</p>
                </div>
                <div class="bg-white p-4 border border-gray-200 rounded-lg">
                    <div class="flex items-center gap-2 text-gray-500 mb-1">
                        <span class="text-xs font-medium uppercase tracking-wider">Ready</span>
                    </div>
                    <p class="text-2xl font-bold text-green-700">${summary.readyForPickup}</p>
                </div>
                <div class="bg-white p-4 border border-gray-200 rounded-lg">
                    <div class="flex items-center gap-2 text-gray-500 mb-1">
                        <span class="text-xs font-medium uppercase tracking-wider">Picked Up</span>
                    </div>
                    <p class="text-2xl font-bold text-slate-700">${summary.completedToday}</p>
                </div>
            `;

            const today = new Date().toISOString().split('T')[0];
            const todayBookings = scheduledByDate[today] || [];

            const alertDiv = document.getElementById('schedule-alert');
            if (todayBookings.length > 0) {
                alertDiv.innerHTML = `
                    <div class="rounded-xl border border-blue-100 bg-gradient-to-r from-blue-50 to-indigo-50 p-5 mb-8 shadow-sm flex items-center justify-between">
                        <div>
                            <p class="text-sm font-bold text-blue-900 uppercase tracking-tight">Today's Appointment Board</p>
                            <p class="text-xs text-blue-600 mt-1 font-medium">There are <span class="font-bold underline">${todayBookings.length} students</span> scheduled for laundry today.</p>
                        </div>
                        <a href="/staff/schedules" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold shadow-md shadow-blue-100 hover:bg-blue-700 transition-all">View All Bookings</a>
                    </div>
                `;
            } else {
                alertDiv.innerHTML = `
                    <div class="rounded-xl border border-amber-100 bg-amber-50 p-5 mb-8 shadow-sm">
                        <p class="text-sm font-bold text-amber-900 uppercase tracking-tight">No Bookings Scheduled</p>
                        <p class="text-xs text-amber-600 mt-1 font-medium">No students have booked a slot for today yet.</p>
                    </div>
                `;
            }

            const urgentPanel = document.getElementById('urgent-panel');
            const urgentList = document.getElementById('urgent-list');
            if (urgentAlerts.length) {
                urgentPanel.classList.remove('hidden');
                urgentList.innerHTML = urgentAlerts.map((alert) => `
                    <div class="rounded-lg border border-rose-200 bg-white p-4">
                        <p class="text-sm font-semibold text-rose-900">${alert.title || ''}</p>
                        <p class="mt-2 text-sm text-rose-800">${alert.message || ''}</p>
                    </div>
                `).join('');
            } else {
                urgentPanel.classList.add('hidden');
            }

            const activeBatches = (batches || []).filter(b => b.status !== 'pickedUp').slice(0, 5);
            const getStatusBadge = (status) => {
                const colors = {
                    booked: 'bg-sky-100 text-sky-800 border-sky-200',
                    pending: 'bg-gray-100 text-gray-800 border-gray-200',
                    collected: 'bg-blue-100 text-blue-800 border-blue-200',
                    washing: 'bg-amber-100 text-amber-800 border-amber-200',
                    washed: 'bg-green-100 text-green-800 border-green-200',
                    pickedUp: 'bg-slate-100 text-slate-600 border-slate-200'
                };
                const labels = {
                    booked: 'Booked',
                    pending: 'Pending',
                    collected: 'Submitted',
                    washing: 'Washing',
                    washed: 'Ready',
                    pickedUp: 'Picked Up'
                };
                return `<span class="px-2.5 py-0.5 rounded-full text-[0.65rem] font-bold uppercase tracking-wider border ${colors[status] || colors.pending}">${labels[status] || status}</span>`;
            };

            const tableContainer = document.getElementById('batches-table-container');
            if (activeBatches.length === 0) {
                tableContainer.innerHTML = `<div class="p-8 text-center text-gray-500">No active batches</div>`;
            } else {
                const rows = activeBatches.map(b => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="py-2.5 px-4 font-medium">${b.student ? b.student.name : '-'}</td>
                        <td class="py-2.5 px-4 text-[10px] uppercase font-bold text-gray-500">${b.scheduledDate || '-'} <br/> ${b.timeSlot || '-'}</td>
                        <td class="py-2.5 px-4 font-mono font-semibold text-blue-600">${b.student ? (b.student.regNo || b.student.reg_no || '-') : '-'}</td>
                        <td class="py-2.5 px-4">${getStatusBadge(b.status)}</td>
                        <td class="py-2.5 px-4 text-gray-500">${safeDate(b.createdAt || b.created_at, 'date')}</td>
                    </tr>
                `).join('');

                tableContainer.innerHTML = `
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="text-left py-2.5 px-4 font-medium text-gray-500">Student</th>
                                <th class="text-left py-2.5 px-4 font-medium text-gray-500">Scheduled</th>
                                <th class="text-left py-2.5 px-4 font-medium text-gray-500">Reg No</th>
                                <th class="text-left py-2.5 px-4 font-medium text-gray-500">Status</th>
                                <th class="text-left py-2.5 px-4 font-medium text-gray-500">Submitted</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">${rows}</tbody>
                    </table>
                `;
            }

            const dailyContainer = document.getElementById('daily-details-container');
            if (todayBookings.length === 0) {
                dailyContainer.innerHTML = `<div class="p-8 text-center text-gray-500">No students scheduled for today</div>`;
            } else {
                const rows = todayBookings.map(b => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="py-2.5 px-4 font-medium">${b.studentName}</td>
                        <td class="py-2.5 px-4 text-[11px] font-bold text-gray-600 uppercase tracking-tight">${b.timeSlot}</td>
                        <td class="py-2.5 px-4 font-mono font-semibold text-blue-600">${b.studentRegNo || '-'}</td>
                        <td class="py-2.5 px-4">${getStatusBadge(b.status)}</td>
                    </tr>
                `).join('');

                dailyContainer.innerHTML = `
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="text-left py-2.5 px-4 font-medium text-gray-500">Student</th>
                                <th class="text-left py-2.5 px-4 font-medium text-gray-500">Slot</th>
                                <th class="text-left py-2.5 px-4 font-medium text-gray-500">Reg No</th>
                                <th class="text-left py-2.5 px-4 font-medium text-gray-500">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">${rows}</tbody>
                    </table>
                `;
            }
        } catch (err) {
            console.error(err);
        }
    }

    loadDashboard();
    setInterval(() => {
        loadDashboard();
    }, 15000);
</script>
{% endblock %}
