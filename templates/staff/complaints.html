{% extends "staff/staff_layout.html" %}

{% block staff_content %}
<div class="space-y-6">
    <div class="flex items-end justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Complaints</h1>
            <p class="text-sm text-gray-500 mt-1">Student issues raised from student portal.</p>
        </div>
        <button id="refresh-btn" class="rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">Refresh</button>
    </div>

    <div id="complaints-list" class="space-y-3"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadComplaints() {
    const res = await fetch('/api/complaints');
    const rows = res.ok ? await res.json() : [];
    const list = document.getElementById('complaints-list');
    if (!rows.length) {
        list.innerHTML = '<div class="rounded-lg border border-dashed border-gray-300 p-8 text-center text-gray-500">No complaints yet.</div>';
        return;
    }
    list.innerHTML = rows.map(r => `
        <div class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <p class="font-semibold text-gray-900">${r.subject}</p>
                    <p class="text-xs text-gray-500 mt-0.5">${r.student ? `${r.student.name} (${r.student.regNo})` : 'Student'} • Room ${r.student ? r.student.roomNumber : '-'}</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="rounded-full px-2 py-0.5 text-xs ${r.status === 'resolved' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${r.status}</span>
                    ${r.status === 'open' ? `<button onclick="resolveComplaint(${r.id})" class="rounded-md border border-green-300 px-2.5 py-1 text-xs text-green-700 hover:bg-green-50">Resolve</button>` : ''}
                </div>
            </div>
            <p class="mt-2 text-sm text-gray-700">${r.message}</p>
            <p class="mt-2 text-xs text-gray-400">${new Date(r.created_at || r.createdAt).toLocaleString('en-IN')}</p>
        </div>
    `).join('');
}

async function resolveComplaint(id) {
    const res = await fetch('/api/complaints/' + encodeURIComponent(id), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'resolved' })
    });
    if (res.ok) loadComplaints();
}

document.getElementById('refresh-btn').addEventListener('click', loadComplaints);
loadComplaints();
</script>
{% endblock %}
