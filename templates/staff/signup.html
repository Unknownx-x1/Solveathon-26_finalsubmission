{% extends "base.html" %}
{% block title %}Staff Signup{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-3xl">
        <div class="card p-8 md:p-10">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-blue-50 rounded-2xl p-3 border border-blue-100">
                    <img src="{{ url_for('static', filename='image.png') }}" alt="VIT Logo" class="h-8">
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Staff Access</h1>
                    <p class="text-sm text-gray-500">Create a new laundry staff account</p>
                </div>
            </div>

            {% if error %}
            <div class="mb-4 rounded-lg bg-red-50 border border-red-200 p-3 text-sm text-red-700">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="mb-4 rounded-lg bg-green-50 border border-green-200 p-3 text-sm text-green-700">{{ success }}</div>
            {% endif %}

            <form method="post" class="space-y-5">
                <div>
                    <label class="text-xs font-semibold text-gray-500">Staff Username</label>
                    <input type="text" id="username" name="username" required class="input-modern w-full mt-2" placeholder="Enter username">
                </div>

                <div>
                    <label class="text-xs font-semibold text-gray-500">Password</label>
                    <input type="password" id="password" name="password" required class="input-modern w-full mt-2" placeholder="Enter password">
                </div>

                <div>
                    <label class="text-xs font-semibold text-gray-500">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required class="input-modern w-full mt-2" placeholder="Confirm password">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-blue-100 transition-all active:scale-95">
                    Create Staff Account
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6"><a href="/staff/login" class="underline">Back to staff login</a></p>
    </div>
</div>
{% endblock %}
